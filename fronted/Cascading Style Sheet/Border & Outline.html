<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chapter 6: Borders & Outline</title>
  <style>
    .card {
      width: 250px;
      padding: 20px;
      margin: 20px;
      border: 2px solid blue;
      border-radius: 15px;
      outline: 2px dashed red;
      background-color: #f9f9f9;
    }
  </style>
</head>
<body>
  <h2>Borders & Outline</h2>
  <div class="card">Card with rounded border and outline</div>
</body>
</html>
