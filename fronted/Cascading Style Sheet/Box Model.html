<!DOCTYPE html>
<html>
<head>
  <style>
    .box1 {
      width: 200px;
      height: 100px;
      padding: 10px;              /* Inner space */
      border: 2px solid black;    /* Border around content */
      margin: 20px;               /* Space outside element */
    }

    .box2 {
      width: 200px;
      height: 100px;
      padding: 30px;              /* Larger padding */
      border: 5px dashed blue;    /* Thick dashed border */
      margin: 40px;               /* Larger margin */
    }

    .box3 {
      width: 200px;
      height: 100px;
      padding: 5px;               /* Small padding */
      border: 1px dotted red;     /* Thin dotted border */
      margin: 10px;               /* Small margin */
    }
  </style>
</head>
<body>
  <div class="box1">Box 1: Normal padding, solid border, medium margin</div>
  <div class="box2">Box 2: Large padding, dashed border, large margin</div>
  <div class="box3">Box 3: Small padding, dotted border, small margin</div>
</body>
</html>
