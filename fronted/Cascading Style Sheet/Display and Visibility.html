<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chapter 7: Display & Visibility</title>
  <style>
    .inline { display: inline; background: lightblue; }
    .block { display: block; background: lightgreen; margin: 10px 0; }
    .hidden { visibility: hidden; }
  </style>
</head>
<body>
  <h2>Display & Visibility</h2>
  <span class="inline">Inline Element</span>
  <div class="block">Block Element</div>
  <p class="hidden">This paragraph is hidden but space remains.</p>
</body>
</html>
