<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chapter 9: Flexbox</title>
  <style>
    .navbar {
      display: flex;
      justify-content: space-around;
      align-items: center;
      background: #444;
      color: white;
      padding: 10px;
    }
    .center-box {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 200px;
      background: lightgray;
    }
    .center-box div {
      background: teal;
      color: white;
      padding: 20px;
      margin: 10px;
    }
  </style>
</head>
<body>
  <h2>Flexbox</h2>
  <div class="navbar">
    <div>Home</div>
    <div>About</div>
    <div>Contact</div>
  </div>
  <div class="center-box">
    <div>Centered Box 1</div>
    <div>Centered Box 2</div>
  </div>
</body>
</html>
