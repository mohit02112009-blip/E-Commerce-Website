<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>List Styling</title>
<style>
ol{
    font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif; font-size: larger; font-weight: bolder; 
letter-spacing: normal; word-spacing: normal;
}
ul{
   font-family: Verdana, Geneva, Tahoma, sans-serif; font-size: medium; font-weight: lighter; letter-spacing: normal; word-spacing: normal;
}
</style>
</head>
<body>
<h1>Favorite Sports</h1>

<ol>
<li>Badminton</li>
<li>Cricket</li>
<li>Cycling</li>
<li>Running</li>
<li>Racing</li>
</ol>

<h1>Favorite Dish</h1>

<ul>
<li>Dosa</li>
<li>Pizza</li>
<li>Burger</li>
<li>Panner</li>
<li>Aloo Paratha</li>
</ul>

</body>
</html>
