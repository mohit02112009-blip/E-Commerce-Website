<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Link design</title>
<style>
    a {
        color: red;
        font-size: 25px;
        background: beige;
        font-family: Georgia, 'Times New Roman', Times, serif;
        font-style: italic;
    }
    a:hover {
        color: blue;
        background: lightgreen;
    }
    a:visited {
        color:blueviolet;
        background: lightyellow;
    } 
</style>
</head>
<body>
<h1>Style a link</h1>
<p><a href="default.asp" target="_blank">This is a link</a></p>  
</body>
</html>
