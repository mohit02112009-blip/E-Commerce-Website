<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page Designm | Using HTML and CSS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Arimo:ital,wght@0,400..700;1,400..700&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
<style>
    body{
        background-color: aqua;
        font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
    }
    .Login_page{
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background-color: white;
        width: 400px;
        padding: 50px;
        width: 400px;
        height: 500px;
        border-radius: 10px;
    }
    .box_input input{
        margin: 10px 0px;
        padding: 13px;
        width: 90%;
        font-family: "Montserrat", sans-serif;
    }
    .login_btn{
        width: 80%;
        background-color: darkblue;
        color: white;
        padding: 13px;
        border: none;
        border-radius: 50px;
        text-align: center;
        font-family: "Montserrat", sans-serif;
        cursor: pointer;
        font-size: 16px;
    }
    .btn_butto{
       text-align: center;
       margin: 20px 0px;
    }
    .social_links{
        text-align: center;
    }
    .social_links li{
        border: 1px solid rgb(196, 196, 196);
        margin: 20px 0px;
        list-style: none;
        padding: 10px 0px;
        border-radius: 50px;
    }
    .social_links li a{
        color:black;
        text-decoration: none;
    }
</style>
</head>
<body>
<div class="Login_page">
<h1>Login page</h1>
<!-- <hr style="width: 30%;"> -->
<div class="Login_box">
<form action="">
<div class="box_input">
<label for="username">Username & Email id</label>
<br>

<input type="text" placeholder="Enter username & Email id">
</div>
<div class="box_input">
<label for="username">Password</label>
<br>
<input type="text" placeholder="Enter Your password (6Digit)">
</div>
<input type="checkbox">
<span>I agree with terms & Conditions</span>
<br>
<div class="btn_butto">
<button type="submit" class="login_btn">Login</button>
</div>
</form>
