<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Span And Grid</title>
<style>
p {
    background-color: blueviolet;
    padding: 20px;
}

span {
    background-color: chartreuse;
    color: cadetblue;
    padding: 10px;
}

p.ex1 {display: none;}
p.ex2 {display: inline;}
p.ex3 {display: block;}     
p.ex4 {display: inline-block;}
p.ex5 {display: flex;}
p.ex6 {display: grid;}
 
h {
    font-family: Georgia, 'Times New Roman', Times, serif;
    font-style: italic;
}

</style>
</head>
<body>
<h1>Social Media</h1>  

<h2>Apps</h2>
<p class="ex1">
<span>Youtube</span>
</p>
<p class="ex2">
<span>Instagram</span>
</p>
<p class="ex3">
<span>Facebook</span>
</p> 
<p class="ex4">  
<span>Twitter</span>
</p>
<p class="ex5">
<span>LinkedIn</span>
</p>
<p class="ex6">
<span>Snapchat</span>
</p>

</body>
</html>
