<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Card - E-commerce Style</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 1200px;
        }

        /* Product Card Styling */
        .product-card {
            width: 280px;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
        }

        .product-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
        }

        /* Image Container */
        .image-container {
            width: 100%;
            height: 250px;
            overflow: hidden;
            position: relative;
            background: #f5f5f5;
        }

        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .product-card:hover .image-container img {
            transform: scale(1.1);
        }

        /* Discount Badge */
        .discount-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background: #ff4757;
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 14px;
            box-shadow: 0 2px 8px rgba(255, 71, 87, 0.3);
            z-index: 10;
        }

        /* Product Info */
        .product-info {
            padding: 20px;
        }

        .product-name {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Rating */
        .rating {
            color: #ffc107;
            font-size: 13px;
            margin-bottom: 12px;
            letter-spacing: 1px;
        }

        .rating i {
            margin-right: 2px;
        }

        /* Price Section */
        .price-section {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .price {
            font-size: 24px;
            font-weight: bold;
            color: #ff4757;
        }

        .original-price {
            font-size: 16px;
            color: #999;
            text-decoration: line-through;
        }

        .discount-percent {
            font-size: 13px;
            background: #fff5f5;
            color: #ff4757;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: bold;
        }

        /* Buy Now Button */
        .btn-buy {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-buy:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-buy:active {
            transform: scale(0.98);
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .container {
                gap: 20px;
            }

            .product-card {
                width: 100%;
                max-width: 280px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Product Card 1 -->
        <div class="product-card">
            <div class="image-container">
                <img src="../Images/7.jpg" alt="Product Image">
                <div class="discount-badge">-30%</div>
            </div>
            <div class="product-info">
                <h2 class="product-name">Premium Headphones</h2>
                <div class="rating">
                    <i class="fas fa-star"></i>
                    <i class="fas fa-star"></i>
                    <i class="fas fa-star"></i>
                    <i class="fas fa-star"></i>
                    <i class="fas fa-star-half-alt"></i>
                    4.5 (120)
                </div>
                <div class="price-section">
                    <span class="price">$69.99</span>
                    <span class="original-price">$99.99</span>
                    <span class="discount-percent">30%</span>
                </div>
                <button class="btn-buy">
                    <i class="fas fa-cart-plus"></i> Buy Now
                </button>
            </div>
        </div>

        <!-- Product Card 2 -->
        <div class="product-card">
            <div class="image-container">
                <img src="../Images/7.jpg" alt="Product Image">
                <div class="discount-badge">-15%</div>
            </div>
            <div class="product-info">
                <h2 class="product-name">Wireless Speaker</h2>
                <div class="rating">
                    <i class="fas fa-star"></i>
                    <i class="fas fa-star"></i>
                    <i class="fas fa-star"></i>
                    <i class="fas fa-star"></i>
                    <i class="fas fa-star"></i>
                    5.0 (85)
                </div>
                <div class="price-section">
                    <span class="price">$84.99</span>
                    <span class="original-price">$99.99</span>
                    <span class="discount-percent">15%</span>
                </div>
                <button class="btn-buy">
                    <i class="fas fa-cart-plus"></i> Buy Now
                </button>
            </div>
        </div>

        <!-- Product Card 3 -->
        <div class="product-card">
            <div class="image-container">
                <img src="../Images/7.jpg" alt="Product Image">
                <div class="discount-badge">-45%</div>
            </div>
            <div class="product-info">
                <h2 class="product-name">Smart Watch</h2>
                <div class="rating">
                    <i class="fas fa-star"></i>
                    <i class="fas fa-star"></i>
                    <i class="fas fa-star"></i>
                    <i class="fas fa-star-half-alt"></i>
                    <i class="far fa-star"></i>
                    3.5 (45)
                </div>
                <div class="price-section">
                    <span class="price">$54.99</span>
                    <span class="original-price">$99.99</span>
                    <span class="discount-percent">45%</span>
                </div>
                <button class="btn-buy">
                    <i class="fas fa-cart-plus"></i> Buy Now
                </button>
            </div>
        </div>
    </div>
</body>
</html>
