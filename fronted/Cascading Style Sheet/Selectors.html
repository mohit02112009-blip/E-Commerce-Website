<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Selectors practice paper.</title>
<style>/* Element Selector */
/* Element Selector */
h1 {
color: blue;
font-size: 30px;
 }

p {
color: darkgreen;
 font-size: 18px;
 }

 /* Class Selector */
.highlight {
 color: orange;
 font-size: 22px;
}

 /* ID Selector */
 #main {
color: purple;
font-size: 26px;
 }

/* Universal Selector */
* { margin: 5px; padding: 0; }

</style>
</head>
<body>
<!--Element Selector applied-->
<h1> Heading styled with a Element Selector </h1>
<p>Paragraph styled with a Element selector.</p> 

<!--Class Selector applied-->
<h2 class="highlighted"> Heading styled with class selector</h1>
<p class ="highlighted">Paragraph styled with class selector.</p>

<!--ID Selector applied-->
<h2 id="main"> Heading styled with ID Selector</h1>
<p id="main"> Paragraph styled with ID selector.</p>
</body>
</html>
