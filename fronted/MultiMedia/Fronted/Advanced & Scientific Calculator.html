<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Advanced Calculator</title>
<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #141e30, #243b55);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .calculator {
        background: #1f2937;
        padding: 20px;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        width: 420px;
    }

    .display {
        width: 100%;
        height: 60px;
        border: none;
        border-radius: 10px;
        margin-bottom: 15px;
        font-size: 1.5em;
        padding: 10px;
        text-align: right;
        background: #111827;
        color: #00ffcc;
    }

    .buttons {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 10px;
    }

    button {
        padding: 15px;
        font-size: 1.1em;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        transition: 0.2s;
    }

    button:hover {
        transform: scale(1.05);
        opacity: 0.9;
    }

    .num { background: #374151; color: rgb(255, 255, 255); }
    .op { background: #f59e0b; color: white; }
    .func { background: #3b82f6; color: white; }
    .equal { background: #10b981; color: white; }
    .clear { background: #ef4444; color: white; }
</style>
</head>

<body>

<div class="calculator">
    <input type="text" id="display" class="display" readonly>

    <div class="buttons">
        <button class="clear" onclick="clearDisplay()">C</button>
        <button class="op" onclick="backspace()">⌫</button>
        <button class="op" onclick="append('(')">(</button>
        <button class="op" onclick="append(')')">)</button>
        <button class="op" onclick="append('/100')">%</button>

        <button class="func" onclick="append('sin(')">sin</button>
        <button class="func" onclick="append('cos(')">cos</button>
        <button class="func" onclick="append('tan(')">tan</button>
        <button class="func" onclick="append('ln(')">ln</button>
        <button class="func" onclick="append('log(')">log</button>

        <button class="num" onclick="append('7')">7</button>
        <button class="num" onclick="append('8')">8</button>
        <button class="num" onclick="append('9')">9</button>
        <button class="op" onclick="append('*')">×</button>
        <button class="op" onclick="append('**')">^</button>

        <button class="num" onclick="append('4')">4</button>
        <button class="num" onclick="append('5')">5</button>
        <button class="num" onclick="append('6')">6</button>
        <button class="op" onclick="append('-')">−</button>
        <button class="func" onclick="append('Math.sqrt(')">√x</button>

        <button class="num" onclick="append('1')">1</button>
        <button class="num" onclick="append('2')">2</button>
        <button class="num" onclick="append('3')">3</button>
        <button class="op" onclick="append('+')">+</button>
        <button class="func" onclick="append('**')">xʸ</button>

        <button class="num" onclick="append('0')">0</button>
        <button class="num" onclick="append('.')">.</button>
        <button class="func" onclick="append('e')">e</button>
        <button class="func" onclick="append('π')">π</button>
        <button class="equal" onclick="calculate()">=</button>
    </div>
</div>

<script>
    const display = document.getElementById("display");

    function append(value) {
        display.value += value;
    }

    function clearDisplay() {
        display.value = "";
    }

    function backspace() {
        display.value = display.value.slice(0, -1);
    }

    function calculate() {
        try {
            const expression = display.value
                .replace(/π/g, `(${Math.PI})`)
                .replace(/\be\b/g, `(${Math.E})`)
                .replace(/log\(/g, 'Math.log10(')
                .replace(/ln\(/g, 'Math.log(')
                .replace(/sin\(/g, 'Math.sin(')
                .replace(/cos\(/g, 'Math.cos(')
                .replace(/tan\(/g, 'Math.tan(');

            const result = Function(`"use strict"; return (${expression})`)();
            display.value = Number.isFinite(result) ? result : 'Error';
        } catch {
            alert("Invalid expression");
        }
    }
</script>

</body>
</html>
