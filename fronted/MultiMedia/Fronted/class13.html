<!DOCTYPE html>
<html>
<head>
<title>Anchor Target & Attributes</title>
</head>
<body>

<!-- Link that opens in a new tab -->
<a href="https://www.google.com" target="_blank">Open Google in New Tab</a>
<br><br>

<!-- Link with tooltip -->
<a href="https://www.example.com" title="This is a tooltip">Hover to see tooltip</a>

</body>
</html>
