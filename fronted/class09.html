<!DOCTYPE html>
<html>
<head>
  <title>Semantic Layout Example</title>
</head>
<body>

  <!-- Header -->
  <header>
    <h1>Site Header</h1>
  </header>

  <!-- Navigation -->
  <nav>
    <ul>
      <li><a href="#home">Home</a></li>
      <li><a href="#articles">Articles</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
  </nav>

  <!-- Main Section -->
  <section>
    <h2>Main Section</h2>
    
    <!-- Article -->
    <article>
      <h3>Article Title</h3>
      <p>This is the content of the article. It represents a self-contained piece of information.</p>
    </article>
    
    <!-- Aside -->
    <aside>
      <h4>Related Info</h4>
      <p>This is some additional information, like a sidebar or related links.</p>
    </aside>
  </section>

  <!-- Footer -->
  <footer>
    <p>&copy; 2026 My Website. All rights reserved.</p>
  </footer>

</body>
</html>
