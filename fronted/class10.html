<!DOCTYPE html>
<html>
<head>
  <title>CSS Example</title>
  <!-- Internal CSS -->
  <style>
    h1 {
      font-size: 30px;
    }
  </style>
</head>
<body>

  <!-- Inline CSS for paragraph -->
  <p style="color:red;">This is a red paragraph.</p>

  <!-- Heading styled with internal CSS -->
  <h1>This is a heading with 30px font size</h1>

</body>
</html>
