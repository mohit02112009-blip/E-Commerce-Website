<!DOCTYPE html>
<html>
<head>
  <!-- Character encoding -->
  <meta charset="UTF-8">

  <!-- Description for SEO -->
  <meta name="description" content="This is a sample webpage demonstrating meta tags for proper text display and SEO friendliness.">

  <title>Meta Tag Example</title>
</head>
<body>
  <h1>Welcome to My Page</h1>
  <p>This page uses UTF-8 encoding and has a description meta tag for SEO.</p>
</body>
</html>
